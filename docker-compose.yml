x-airflow-env: &airflow-env
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://root:password@mariadb:3306/realestate_db
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__WEBSERVER__SECRET_KEY: realestate-secret-key-2024
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  MARIADB_HOST: mariadb
  MARIADB_PORT: 3306
  MARIADB_USER: root
  MARIADB_PASSWORD: password
  MARIADB_DATABASE: realestate_db
  REDIS_HOST: redis
  REDIS_PORT: 6379
  MLFLOW_TRACKING_URI: http://mlflow:5000
  PYTHONPATH: /opt/airflow

x-airflow-volumes: &airflow-volumes
  - ./airflow/dags:/opt/airflow/dags
  - ./src:/opt/airflow/src
  - ./data:/opt/airflow/data
  - ./models:/opt/airflow/models
  - ./reports:/opt/airflow/reports
  - airflow-logs:/opt/airflow/logs

services:
  mariadb:
    image: mariadb:11
    container_name: realestate-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: realestate_db
    ports:
      - "3307:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: realestate-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: realestate-mlflow
    restart: unless-stopped
    working_dir: /mlflow
    volumes:
      - mlflow-data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/mlartifacts
    ports:
      - "5002:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: realestate-airflow-init
    restart: "no"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_FIRSTNAME: Admin
      _AIRFLOW_WWW_USER_LASTNAME: User
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com
      _AIRFLOW_WWW_USER_ROLE: Admin
    volumes: *airflow-volumes
    entrypoint: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com || true
      "

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: realestate-airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes: *airflow-volumes
    ports:
      - "8081:8080"
    command: airflow webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: realestate-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes: *airflow-volumes
    command: airflow scheduler

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realestate-api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      MARIADB_USER: root
      MARIADB_PASSWORD: password
      MARIADB_DATABASE: realestate_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
    ports:
      - "8001:8000"
    command: uvicorn src.serving.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: realestate-streamlit
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_URL: http://api:8000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    ports:
      - "8502:8501"
    command: streamlit run src/ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true

volumes:
  mariadb-data:
  mlflow-data:
  airflow-logs:
